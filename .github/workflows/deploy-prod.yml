name: "Deploy Auth Lambda (Produção)"

on:
  push:
    branches: [ "main", "stage" ]
  pull_request:
    branches: [ "main" ]
  
  # A NOSSA TRAVA DE SEGURANÇA (GATILHO MANUAL)
  # workflow_dispatch: 
  #   inputs:
  #     executar_apply:
  #       description: 'ATENÇÃO: Marque para executar o Terraform APPLY e DEPLOY na AWS'
  #       required: true
  #       type: boolean
  #       default: false

# Variáveis Globais de Produção
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: "us-east-2" # A região onde a AWS CLI vai atuar
  TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_db_name: "db_oficina" # Ajustado com o nome real do seu RDS
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

jobs:
  plan:
    name: "Build Code & Terraform Plan"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # --- ETAPA 1: PREPARAÇÃO DO NODE.JS ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Instalar dependências (pg e jsonwebtoken)
        run: npm install

      - name: Empacotar Lambda (ZIP)
        # Zipa apenas o código e as bibliotecas, ignorando a pasta do terraform
        run: zip -r lambda-auth.zip index.js node_modules/

      - name: Salvar ZIP (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: lambda-auth.zip
          retention-days: 1

      # --- ETAPA 2: VALIDAÇÃO DO TERRAFORM ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ./terraform # Executa dentro da pasta terraform/
        run: terraform init

      - name: Terraform Format
        working-directory: ./terraform
        run: terraform fmt

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan -input=false

      - name: Salvar o Plano (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/
          retention-days: 1


  apply:
    name: "Terraform Apply & Code Deploy"
    runs-on: ubuntu-latest
    needs: plan
    
    # Executa apenas se for o gatilho manual com o checkbox marcado
    if: github.event_name == 'workflow_dispatch' && inputs.executar_apply == true
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Baixar o Plano exato validado
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Baixar o ZIP da Lambda
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip

      # --- ETAPA 3: CRIAÇÃO DA INFRAESTRUTURA ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -input=false tfplan

      # --- ETAPA 4: DEPLOY DO CÓDIGO FINAL ---
      - name: Atualizar Código na AWS Lambda
        # O Terraform criou a Lambda com um "dummy zip". Agora o AWS CLI injeta o código real.
        run: |
          aws lambda update-function-code \
            --function-name AuthLambdaProd \
            --zip-file fileb://lambda-auth.zip \
            --region us-east-2