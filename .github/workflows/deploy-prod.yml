name: "Deploy Auth Lambda (Produção)"

on:
  push:
    branches: [ "main", "stage" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

# ==========================================
# PERMISSÃO PARA O ROBÔ CRIAR O PR
# ==========================================
permissions:
  contents: write
  pull-requests: write

# Variáveis Globais de Produção
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: "us-east-2"
  TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_db_name: "db_oficina" 
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

jobs:
  plan:
    name: "Build Code & Terraform Plan"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # --- ETAPA 1: PREPARAÇÃO DO NODE.JS ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Instalar dependências (pg e jsonwebtoken)
        run: npm install

      - name: Empacotar Lambda (ZIP)
        run: zip -r lambda-auth.zip index.js node_modules/

      - name: Salvar ZIP (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: lambda-auth.zip
          retention-days: 1

      # --- ETAPA 2: VALIDAÇÃO DO TERRAFORM ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Format
        working-directory: ./terraform
        run: terraform fmt

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan -input=false

      - name: Salvar o Plano (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan # Salva apenas o arquivo do plano gerado
          retention-days: 1

      # ==========================================
      # O MOTOR DO AUTO-PR (Stage -> Main)
      # ==========================================
      - name: Criar Pull Request Automático
        if: github.ref == 'refs/heads/stage' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Criando PR automático da Stage para a Main..."
          gh pr create \
            --base main \
            --head stage \
            --title "🚀 Deploy Automático: Stage para Main" \
            --body "Este PR foi criado automaticamente pela esteira após o sucesso do Terraform Plan na branch Stage. Verifique o plano nos logs antes de aprovar." \
            || echo "Aviso: O PR já existe ou não há mudanças para mesclar."


  apply:
    name: "Terraform Apply & Code Deploy"
    runs-on: ubuntu-latest
    needs: plan
    
    # Roda apenas na Main ou dispatch manual
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    # A TRAVA DE APROVAÇÃO (Igual ao SNS e DB)
    environment: 
      name: production
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Baixar o Plano exato validado
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/ # Devolve o tfplan para dentro da pasta terraform

      - name: Baixar o ZIP da Lambda
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip

      # --- ETAPA 3: CRIAÇÃO DA INFRAESTRUTURA ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -input=false tfplan

      # --- ETAPA 4: DEPLOY DO CÓDIGO FINAL ---
      - name: Atualizar Código na AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name AuthLambdaProd \
            --zip-file fileb://lambda-auth.zip \
            --region us-east-2